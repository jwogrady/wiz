name: ShellCheck Lint

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck on scripts
        run: |
          # Find all shell scripts:
          # - All .sh files
          # - bin/bootstrap and bin/install (no .sh extension but are bash scripts)
          find . -type f \( -name '*.sh' -o -path './bin/bootstrap' -o -path './bin/install' \) \
            -not -path './.git/*' \
            -exec shellcheck --severity=error {} +
