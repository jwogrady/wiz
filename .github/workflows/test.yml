name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bats:
    name: BATS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: sudo apt-get install -y bats

      - name: Run tests
        run: bats tests/
